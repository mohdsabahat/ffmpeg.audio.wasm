name: Build FFmpeg WASM and Release

on:
  # Trigger manually from the Actions tab
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (e.g. v1.0.0)'
        required: true
        default: 'v1.0.0'
      release_name:
        description: 'Release title'
        required: true
        default: 'FFmpeg WASM - rubberband + afir'

  # OR push a git tag:  git tag v1.0.0 && git push --tags
  push:
    tags:
      - 'v*.*.*'

jobs:
  build:
    name: Build FFmpeg WASM
    runs-on: ubuntu-22.04      # pinned to jammy — same as emsdk base image
    timeout-minutes: 360       # build takes 45-90 min; 6h hard cap

    steps:
      # ── 1. Checkout WITH submodules ───────────────────────────────────────────
      # The repo manages its own Emscripten via modules/emsdk (a git submodule).
      # We must check out ALL submodules — ffmpeg, rubberband, emsdk, etc.
      - name: Checkout repository with all submodules
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      # ── 1b. Verify submodules were checked out ────────────────────────────────
      - name: Verify submodules
        run: |
          echo "=== Checking submodule status ==="
          git submodule status
          echo "=== Listing modules directory ==="
          ls -la modules/ || echo "ERROR: modules/ directory not found!"
          echo "=== Verifying key submodules exist ==="
          for dir in modules/emsdk modules/ffmpeg modules/rubberband modules/libsamplerate modules/libsndfile modules/lame modules/Ogg modules/opus modules/vorbis; do
            if [ -d "$dir" ]; then
              echo "OK: $dir exists"
            else
              echo "ERROR: $dir missing - attempting manual init"
              git submodule update --init --recursive
              break
            fi
          done

      # ── 2. Install system dependencies (same packages init-dependencies needs) ─
      - name: Install system build dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            autoconf automake libtool pkg-config ragel \
            build-essential cmake python3 python3-pip \
            git wget curl zip unzip

      # ── 3. Fix git safe.directory (needed so scripts can call git inside /src) ─
      - name: Fix git safe.directory
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/modules/emsdk"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/modules/ffmpeg"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/modules/rubberband"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/modules/libsamplerate"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/modules/libsndfile"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/modules/lame"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/modules/Ogg"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/modules/opus"
          git config --global --add safe.directory "$GITHUB_WORKSPACE/modules/vorbis"

      # ── 4. Bootstrap Emscripten from the repo's own emsdk submodule ───────────
      # Using version 3.1.2 to match init-dependencies.sh
      - name: Set up Emscripten (via repo's own emsdk submodule)
        run: |
          cd modules/emsdk
          ./emsdk install 3.1.2
          ./emsdk activate 3.1.2
          # Source the env so emcc is on PATH for subsequent steps
          source ./emsdk_env.sh
          emcc -v

      # ── 5. Cache compiled third-party libs (rubberband, lame, opus, etc.) ─────
      # Key on submodule hashes — cache busts automatically when deps change.
      - name: Generate cache key from submodule hashes
        id: submodule-hash
        run: echo "hash=$(git submodule status | sha256sum | cut -c1-16)" >> $GITHUB_OUTPUT

      - name: Cache build directory
        uses: actions/cache@v4
        with:
          path: |
            build/wasm
            build/lib
            build/include
          key: ffmpeg-wasm-libs-${{ runner.os }}-${{ steps.submodule-hash.outputs.hash }}
          restore-keys: |
            ffmpeg-wasm-libs-${{ runner.os }}-

      # ── 6. Run the full build ─────────────────────────────────────────────────
      # Source emsdk_env.sh first so emcc/emmake/emconfigure are on PATH,
      # then delegate to the repo's own build.sh which chains all build-*.sh files.
      - name: Build FFmpeg WASM
        run: |
          source modules/emsdk/emsdk_env.sh
          echo "=== emcc version ==="
          emcc -v
          echo "=== Starting build ==="
          bash build/scripts/build.sh
          echo "=== Build finished — output files ==="
          find build -name '*.wasm' -o -name '*.js' | sort

      # ── 7. Locate the output files ────────────────────────────────────────────
      # Build script outputs to build/wasm/
      # Falls back to searching if the path ever changes.
      - name: Locate build outputs
        id: locate
        run: |
          OUT_DIR="build/wasm"
          if [ ! -f "$OUT_DIR/ffmpeg.wasm" ]; then
            echo "WARNING: expected output not at $OUT_DIR — searching..."
            WASM=$(find build -name 'ffmpeg.wasm' | head -1)
            if [ -z "$WASM" ]; then
              echo "ERROR: ffmpeg.wasm not found anywhere in build/"
              exit 1
            fi
            OUT_DIR=$(dirname "$WASM")
          fi
          echo "out_dir=$OUT_DIR" >> $GITHUB_OUTPUT
          echo "Found outputs in: $OUT_DIR"
          ls -lh "$OUT_DIR"

      # ── 8. Package artefacts ──────────────────────────────────────────────────
      - name: Package artefacts
        run: |
          OUT="${{ steps.locate.outputs.out_dir }}"
          zip -j ffmpeg-audio-wasm.zip \
            "$OUT/ffmpeg.js" \
            "$OUT/ffmpeg.wasm" \
            "$OUT/ffmpeg.worker.js"
          gzip --force -9 -c "$OUT/ffmpeg.wasm"      > ffmpeg.wasm.gz
          gzip --force -9 -c "$OUT/ffmpeg.js"        > ffmpeg.js.gz
          gzip --force -9 -c "$OUT/ffmpeg.worker.js" > ffmpeg.worker.js.gz
          echo "=== Release files ==="
          ls -lh ffmpeg-audio-wasm.zip ffmpeg.wasm.gz ffmpeg.js.gz ffmpeg.worker.js.gz

      # ── 9. Resolve release metadata ───────────────────────────────────────────
      - name: Resolve release tag and title
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}"           >> $GITHUB_OUTPUT
            echo "name=${{ github.event.inputs.release_name }}" >> $GITHUB_OUTPUT
          else
            TAG="${GITHUB_REF#refs/tags/}"
            echo "tag=$TAG"                                      >> $GITHUB_OUTPUT
            echo "name=FFmpeg WASM $TAG - rubberband + afir"    >> $GITHUB_OUTPUT
          fi

      # ── 10. Publish GitHub Release ────────────────────────────────────────────
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name:   ${{ steps.meta.outputs.tag }}
          name:       ${{ steps.meta.outputs.name }}
          draft:      false
          prerelease: false
          body: |
            ## FFmpeg WebAssembly Build

            Built from commit `${{ github.sha }}`

            ### Included features
            | Feature | Status |
            |---------|--------|
            | `rubberband` pitch shift and time stretch | YES |
            | `afir` convolution reverb / impulse response | YES |
            | `--enable-rdft` FFT (required by afir) | YES |
            | 100+ audio filters (aecho, equalizer, compand, etc.) | YES |
            | Decoders: mp3, aac, opus, flac, wav, ogg, wma | YES |
            | Encoders: mp3, aac, opus, flac, wav | YES |

            ### Files
            | File | Description |
            |------|-------------|
            | `ffmpeg-audio-wasm.zip` | All 3 files zipped — start here |
            | `ffmpeg.js` | JS glue code |
            | `ffmpeg.wasm` | Main binary |
            | `ffmpeg.worker.js` | Web Worker |
            | `*.gz` | Pre-compressed versions for CDN use |

            ### Usage — afir (convolution reverb)
            ```js
            // afir needs TWO inputs: dry audio + impulse response
            await ffmpeg.run(
              '-i', 'dry.wav',
              '-i', 'impulse_response.wav',
              '-filter_complex', '[0][1]afir',
              'output.wav'
            );
            ```
            ### Usage — rubberband (pitch shift)
            ```js
            await ffmpeg.run(
              '-i', 'input.mp3',
              '-af', 'rubberband=pitch=1.5',
              'output.wav'
            );
            ```
          files: |
            ${{ steps.locate.outputs.out_dir }}/ffmpeg.js
            ${{ steps.locate.outputs.out_dir }}/ffmpeg.wasm
            ${{ steps.locate.outputs.out_dir }}/ffmpeg.worker.js
            ffmpeg.wasm.gz
            ffmpeg.js.gz
            ffmpeg.worker.js.gz
            ffmpeg-audio-wasm.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
